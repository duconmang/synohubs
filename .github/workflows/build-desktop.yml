name: Build SynoHubs Desktop

on:
  # Tự động chạy khi push tag version
  push:
    tags:
      - 'v*'
  # Hoặc chạy thủ công từ GitHub UI
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - windows
          - linux

permissions:
  contents: write  # Cần để tạo GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-13
            target: x86_64-apple-darwin
            name: macOS-Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    # Lọc platform nếu chạy workflow_dispatch
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      (github.event.inputs.platform == 'macos' && contains(matrix.platform, 'macos')) ||
      (github.event.inputs.platform == 'windows' && matrix.platform == 'windows-latest') ||
      (github.event.inputs.platform == 'linux' && matrix.platform == 'ubuntu-22.04')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: synohubs/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: synohubs/src-tauri -> target

      # Linux: cài thêm system dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        working-directory: synohubs
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (optional - bỏ qua nếu chưa có cert)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: synohubs
          tagName: ${{ github.ref_name }}
          releaseName: 'SynoHubs ${{ github.ref_name }}'
          releaseBody: |
            ## SynoHubs ${{ github.ref_name }}
            
            ### Downloads
            | Platform | File |
            |----------|------|
            | 🍎 macOS (Apple Silicon) | `.dmg` |
            | 🍎 macOS (Intel) | `.dmg` |  
            | 🪟 Windows | `.exe` / `.msi` |
            | 🐧 Linux | `.deb` / `.AppImage` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # Upload artifact (backup nếu không tạo release)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SynoHubs-${{ matrix.name }}
          path: |
            synohubs/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            synohubs/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            synohubs/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            synohubs/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            synohubs/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            synohubs/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          retention-days: 30
          if-no-files-found: ignore
